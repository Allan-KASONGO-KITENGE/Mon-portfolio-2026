    <header>
        <div>
            <a href=>Mon portfolio</a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Acceuil</a></li>
                <li><a href="projets.html">Projets</a></li>

                <li><a href="contacts.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main class="contact-main">
        <div class="contact-card">
            <div class="form-section">
                <h2>Contactez-nous</h2>
                <form>
                    <div class="input-group">
                        <label for="name">Nom*</label>
                        <input type="text" id="name" name="name" placeholder="Votre nom complet" required>
                    </div>
                    <div class="input-group">
                        <label for="phone">Téléphone</label>
                        <input type="tel" id="phone" name="phone" placeholder="+243 ...">
                    </div>
                    <div class="input-group">
                        <label for="message">Message*</label>
                        <textarea id="message" name="message" placeholder="Votre message..." rows="3" required></textarea>
                    </div>
                    <button type="submit" class="send-btn">Envoyer</button>
                </form>
            </div>

            <div class="info-section">
                <h3>Mes coordonnées</h3>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <p>Lubumbashi, DRC</p>
                </div>
                <div class="info-item">
                    <i class="fas fa-phone-alt"></i>
                    <p>+243838978307</p>
                </div>

                <div class="social-icons">
                    <a href="https://wa.me/243838978307" target="_blank" class="social-icon whatsapp" title="WhatsApp">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                    <a href="https://t.me/243838978307" target="_blank" class="social-icon telegram" title="Telegram">
                        <i class="fab fa-telegram"></i>
                    </a>
                </div>
            </div>
        </div>
    </main>

    </footer>
</body>
</html>
